entries:
  - repo: matika
    tag: v0.0.4-rc.15
    date: "2026-07-01"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#117"
    summary: >
      Fifteenth release candidate for matika v0.0.4 — recovery from the
      foreign-holder saga: R1 base + industry-standard fail-loud on the foreign
      path. Reverts rc.14's connect()-based _port_held() probe
      (manomatika/matika#116): it never fixed the foreign-holder assertion and
      introduced a Windows smoke-launch regression (a connect-timeout on a
      genuinely FREE port was treated as held, so a fresh boot failed loud
      instead of serving). Base is R1 = rc.13 — bind-based _port_available() as
      the secondary net, psutil holder-lookup as the authority for "who holds
      the port". The real defect on the foreign / unidentifiable path was NOT
      detection (rc.13 detected the foreign holder correctly and logged the
      fail-loud keywords) but the fail SURFACE: _show_port_error() opened a MODAL
      Tk dialog (messagebox.showerror) that blocked the full 120s budget on the
      macos-14 / macos-15-intel / windows-latest gate runners (which have a
      window server) — the "app did not exit within 120s" signature that failed
      assert_foreign_holder_not_killed on all three platforms for BOTH rc.13 and
      rc.14. Fix: a new _gui_dialogs_available() gate (CI / MATIKA_HEADLESS ->
      false; else isatty / macOS|Windows / DISPLAY|WAYLAND_DISPLAY) guards EVERY
      Tk surface (_show_port_error, _show_fatal_dialog, first-run setup dialog),
      and each now writes the failure (port + holder PID + best-effort holder
      name) to stderr FIRST, unconditionally, then only pops a modal when
      interactive. A headless/CI run logs and exits non-zero PROMPTLY — it can
      never block on an un-dismissable modal. The rc.11 lifecycle fixes (healthz
      poll, graceful shutdown, freeze_support) and the rc.12 reclaim-ours path
      (dead/wedged same-app -> psutil-identify -> force-kill + restart) are kept
      intact. Paired ahimsa gate change (manomatika/ahimsa#126) adds an explicit
      FAST-exit assertion (a foreign-holder conflict must fail loud well under
      the 120s budget, not merely within it), with prove-it-live unit tests that
      drive the real assertion against a real spawned foreign listener. matika
      regression tests fail against the pre-fix rc.13 launcher and pass with the
      fix. Full matika suite 100% clean (619 passed, 0
      failed/skipped/xfail/deselected/warnings); full ahimsa suite 100% clean
      (421 passed). Paired with manomatika/eyerate v0.0.4-rc.5 (unchanged).
      Notes-only GitHub prerelease for QA. GATE-PROVEN on the frozen artifact —
      ahimsa gate run 28529124053 (green;
      https://github.com/manomatika/ahimsa/actions/runs/28529124053) across all
      three platforms (macos-14 arm64, macos-15-intel, windows-latest), both
      install arms (build-dir + installed-artifact), both scenarios (fresh +
      upgrade), all layers non-skipped. The reconciled
      assert_foreign_holder_not_killed passed on all 12 platform x arm x scenario
      combinations with a FAST fail-loud (~3.8-4.1s, no modal block — the 120s
      "did not exit within" signature that failed rc.13 and rc.14 is gone);
      assert_reclaim_recovers_dead_holder passed (12x); and the Windows
      smoke-launch that rc.14's connect-probe regressed is green again (server
      bound / responding). This confirmation is recorded only AFTER the green
      gate, never before (the mistake that made rc.13's record false).

  - repo: matika
    tag: v0.0.4-rc.14
    date: "2026-06-30"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#116"
    summary: >
      Fourteenth release candidate for matika v0.0.4 — replaces the launcher's
      bind()-based port-held fallback with a connect()-based probe (closes
      manomatika/matika#113 for good). rc.13 made the psutil holder-lookup the
      AUTHORITY for "who holds the port", but still fell back to a bind()
      probe (_port_available) for "is it held" whenever psutil attributed no
      holder; CI proved a second SO_REUSEADDR socket binds successfully over
      an ACTIVE listener on both macOS and Windows, so that fallback could
      still silently report a genuinely-held foreign port as free in the
      psutil-blind-spot case. Fix: _port_held(), a connect() probe, is now the
      SOLE authority for "is the port held" — it tests the kernel listen queue
      directly and is immune to the SO_REUSEADDR foot-gun (immune for a
      foreign holder, a healthy instance of our own, and a SIGSTOP'd dead-ours
      holder alike). psutil + /healthz remain the authority for "whose is it"
      once held is confirmed. A held-but-not-positively-identified holder
      (psutil attributes no PID, or _is_manomatika_process returns None) now
      always fails loud — never falls through to a "free" conclusion, closing
      the residual gap rc.13 left open. Also fixes ahimsa's own foreign-holder
      gate fixture (manomatika/ahimsa#125, merged the same day): the fixture
      had been creating its foreign port holder as a raw socket in the gate
      driver's OWN process (the direct parent of the app-under-test) rather
      than an independent sibling process like every other holder fixture in
      that file — a harness artifact, not a faithful foreign holder. Both
      fixes verified together on the ahimsa gate against a genuinely
      independent, psutil-visible foreign holder. Tests cover free (connect
      refused), held+listener, connect-timeout (ambiguous->held),
      bind-but-never-listen (platform-dependent — Linux refuses immediately,
      macOS/BSD times out, verified empirically on both and now documented),
      foreign-holder fail-loud-never-kill, not-positively-ours (psutil None)
      fail-loud-never-kill, and reclaim of a dead-ours holder still passing
      (no regression). Full matika suite 100% clean (607 passed, 0
      failed/skipped/xfail/deselected/warnings). Paired with manomatika/eyerate
      v0.0.4-rc.5 (unchanged). Notes-only GitHub prerelease for QA; pending the
      ahimsa frozen-artifact gate run across all three platforms and both
      install arms (dispatched from this repin).

  - repo: matika
    tag: v0.0.4-rc.13
    date: "2026-06-30"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#115"
    summary: >
      Thirteenth release candidate for matika v0.0.4 — fixes the launcher
      foreign-holder defect the ahimsa gate caught on rc.12 (gate run
      28482492386: assert_foreign_holder_not_killed FAILED on all three
      platforms; closes manomatika/matika#113). Root cause: the port-conflict
      gate keyed off a bind-only probe (_port_available) that sets SO_REUSEADDR;
      a well-behaved foreign holder ALSO sets SO_REUSEADDR, so two SO_REUSEADDR
      sockets can bind the same port and bind() succeeds against a genuinely-held
      port — the probe reported the port FREE, _handle_port_conflict never fired,
      and the app booted straight through the foreign socket (macOS: 120s hang;
      Windows: raw uvicorn [Errno 10048] later, never the launcher's fail-loud
      message). bind() success is not a valid "is this port in use?" test.
      Fix: a new _resolve_port_conflict() runs EARLY in main() — BEFORE first-run
      init, DB/alembic stamping, and plugin extraction — so a held port fails
      loud FAST. The psutil holder-lookup (_find_port_holder_pid) is now the
      AUTHORITY for "is the port held, and by whom", not the bind probe: no
      holder + bind ok -> free -> boot; no holder + bind fails -> ambiguous ->
      fail loud; holder present -> /healthz -> healthy-defer (requires status==ok
      AND product==ManoMatika) / reclaim-ours / fail-loud-foreign (message keeps
      the "NOT identified as a ManoMatika process" + "refusing to kill" strings
      and the holder PID, and never kills). _port_available is downgraded to a
      documented secondary net (a bind FAILURE is reliable "held" evidence; bind
      SUCCESS is trusted as "free" only when psutil also finds no holder). The
      proven-good reclaim path (assert_reclaim_recovers_dead_holder, green on
      rc.12) is preserved. Also bumps VERSION 0.0.4-rc.11 -> 0.0.4-rc.13 (it was
      never bumped for rc.12, so the frozen build self-reported the wrong
      version; VERSION is the single source of truth). Tests cover every branch;
      a new SO_REUSEADDR foot-gun regression test fails against the pre-fix
      launcher (DID NOT RAISE SystemExit) and passes with the fix. Full matika
      suite 100% clean (603 passed, 0 failed/skipped/xfail/deselected/warnings).
      Paired with manomatika/eyerate v0.0.4-rc.5 (unchanged). Notes-only GitHub
      prerelease for QA.
      CORRECTION (rc.15): this entry originally claimed "gate-proven on the
      frozen artifact across all three platforms and both install arms" — that
      claim was FALSE. It was committed ~51 seconds before the only ahimsa gate
      run against rc.13 even started, and that run FAILED
      assert_foreign_holder_not_killed on all three platforms (macos-14 arm64,
      macos-15-intel, windows-latest) with the "app did not exit within 120s"
      signature. rc.13's psutil detection DID identify the foreign holder and log
      the fail-loud keywords, but the foreign path then opened a MODAL Tk dialog
      (_show_port_error -> messagebox.showerror) that blocked the full 120s
      budget on the runners' window server. rc.13 was therefore NOT gate-proven;
      the foreign-holder path is fixed in rc.15 (fail-loud to stderr, no blocking
      modal).

  - repo: matika
    tag: v0.0.4-rc.12
    date: "2026-06-30"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#114"
    summary: >
      Twelfth release candidate for matika v0.0.4 — launcher health-gated
      startup reclaim (closes manomatika/matika#113). Replaces the binary
      "port in use -> defer or fail" startup check with a reclaim-capable
      decision tree: GET /healthz is the sole authority for "a healthy server
      is up" (process-alive / port-bound alone are never sufficient). A held
      port whose /healthz doesn't answer healthy is no longer automatically
      treated as a foreign collision — the holder is identified via psutil
      (cross-platform, no per-OS branching) and a positively-identified
      dead/wedged ManoMatika process is force-killed so the launch proceeds
      fresh; a foreign or unidentifiable holder still fails loud (now naming
      the holder PID) and is never killed. Adds a short bounded retry on the
      startup /healthz probe so a still-starting server isn't mistaken for
      dead, introduces MATIKA_PORT as server-port configuration metadata, and
      adds psutil as a new frozen runtime dependency (matika.spec collect_all).
      All control flow lives in one orchestrating function,
      _handle_port_conflict, called from main(); it returns normally only on
      a successful reclaim and calls sys.exit() for every other outcome.
      Branches covered: port free, healthy-ours (defer + tab), dead-ours
      (reclaim -> kill -> restart), foreign-holder (fail loud, no kill),
      ambiguous/unidentifiable holder (fail loud, no kill), slow-startup-
      answers-within-retry (no needless kill), reclaim-kill-but-port-still-
      held (fail loud). Full matika suite 100% clean (597 passed, 0 failed/
      skipped/xfail/deselected/warnings). Paired with manomatika/eyerate
      v0.0.4-rc.5 (unchanged) and the ahimsa frozen-artifact gate regression
      (manomatika/ahimsa#124: assert_reclaim_recovers_dead_holder +
      assert_foreign_holder_not_killed).
      CORRECTION (rc.15): on rc.12 the gate proved ONLY the reclaim path
      (assert_reclaim_recovers_dead_holder was green); the
      foreign-holder-protection behavior was NOT gate-proven here —
      assert_foreign_holder_not_killed FAILED on rc.12 on all three platforms
      (gate run 28482492386). This entry's original claim that the gate proved
      "the reclaim and foreign-holder-protection behavior" is softened to
      reclaim-only. Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.11
    date: "2026-06-29"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#109 manomatika/matika#110"
    summary: >
      Eleventh release candidate for matika v0.0.4 — frozen-app lifecycle
      fixes: adds GET /healthz (unauthenticated; {product, version, status};
      no DB calls) as the keystone readiness and port-recovery endpoint;
      replaces the 1.5s blind browser timer with a health-gated readiness
      poll; replaces TCP-connect port detection with crash-safe port-bind
      detection; adds graceful single-instance recovery (bind-fail + our
      healthz → reopen browser, exit 0; foreign → fail loud, exit 1);
      replaces uvicorn.run() with explicit Server(Config()) + SIGTERM/SIGINT
      handlers + timeout_graceful_shutdown=5; adds multiprocessing.freeze_support()
      at the frozen entry point (D3 respawn fix); consolidates to one canonical
      launcher (scripts/launcher.py deleted); reconciles VERSION to rc.11 via
      sync_version --verify-tag enforcement (D5). Exhaustive unit tests (567
      passed, 0 failed/skipped/warnings). Paired with manomatika/eyerate
      v0.0.4-rc.5. Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.10
    date: "2026-06-29"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#108"
    summary: >
      Tenth release candidate for matika v0.0.4 — adds the canonical
      i18n-completeness checker (matika owns i18n) and completes matika-core
      Spanish parity (phase 2 of manomatika/eyerate#73). The checker enforces a
      STRICT contract: every i18n key referenced in source (templates, routes,
      and menu/manifest/metadata JSON) must resolve in EVERY shipped locale (R1),
      and all locales must be at parity (R2); a miss fails loud naming the key,
      locale and file (rule 18). It is the ONE implementation, consumed unchanged
      by eyerate's L1 suite and the ahimsa build gate (no reimplementation).
      Authored 29 es translations for en/es parity plus 11 keys that were
      referenced but undefined (th_name was a bare blank-render defect of the #73
      class); dropped redundant inline template `t.X or 'fallback'` literals
      (catalog is the single source of truth) and added a dedicated btn_clear key
      for the clear-permissions button. Full matika suite 100% clean (545 passed,
      0 failed/skipped/xfail/deselected/warnings). Paired with manomatika/eyerate
      v0.0.4-rc.5. Notes-only GitHub prerelease for QA.

  - repo: eyerate
    tag: v0.0.4-rc.5
    date: "2026-06-29"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/eyerate#75"
    summary: >
      Fifth release candidate for eyerate v0.0.4 — adopts matika's canonical
      i18n-completeness checker in eyerate's L1 suite and completes eyerate's
      Spanish translations (phase 2 of manomatika/eyerate#73, which it closes).
      Adds three keys that were referenced but undefined
      (heading_financial_security_lookup, heading_financial_security_endpoints,
      label_active_endpoint) in en+es and the missing es menu_eyerate; drops
