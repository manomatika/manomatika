entries:
  - repo: matika
    tag: v0.0.4-dev.2
    date: "2026-05-07"
    status: published
    artifact: "@manomatika/matika-frontend@0.0.4-dev.2 (GitHub Packages)"
    prs: "manomatika/matika#37"
    summary: >
      Adds the import map entry for @manomatika/matika-frontend in matika's
      base.html. Applugs (eyerate first) can now import the package via bare
      specifier; matika owns the URL mapping centrally so applugs do not
      hardcode /static/js/index.js. Package contents are unchanged from
      v0.0.4-dev.1 — the bump exists for ecosystem version coherence under the
      convention that committed-tree changes get their own prerelease-bumped tag.

  - repo: matika
    tag: v0.0.4-dev.1
    date: "2026-05-06"
    status: published
    artifact: "@manomatika/matika-frontend@0.0.4-dev.1 (GitHub Packages)"
    prs: "manomatika/matika@23de78d (direct-to-main lockfile fix; no PR opened)"
    summary: >
      First successful publish of @manomatika/matika-frontend. Establishes
      the public TypeScript surface for applugs to consume: MaintenanceActivityManager,
      ActivityMetadata, getCsrfToken, injectCsrfToken. Tagged from a direct-to-main
      commit that committed the previously-missing package-lock.json. Future lockfile
      changes must follow standard branch + PR discipline.

  - repo: matika
    tag: v0.0.4-dev.0
    date: "2026-05-06"
    status: "superseded (by matika v0.0.4-dev.1)"
    artifact: "none (publish failed; breadcrumb only)"
    prs: "manomatika/matika#35"
    summary: >
      First attempted publish of @manomatika/matika-frontend. The publish
      workflow failed in npm ci because package-lock.json was not committed to
      the repository. Tag retained as audit breadcrumb; superseded by v0.0.4-dev.1
      which committed the lockfile and republished successfully.

