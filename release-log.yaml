  - repo: eyerate
    tag: v0.0.4-rc.1
    date: "2026-06-17"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/eyerate#42, manomatika/eyerate#43"
    summary: >
      First release candidate for eyerate v0.0.4 — the ManoMatika v0.0.1 product
      cut (matika v0.0.4 + eyerate v0.0.4 + ahimsa v0.0.1) — published as a
      notes-only GitHub prerelease for QA, not a blessed product release. eyerate
      is a Matika applug; its applug.json carries bare core 0.0.4 for both version
      and matika_version. Adds the release pipeline mirroring matika
      (sync_version.py propagation of version + matika_version with a --check
      drift mode; a canonical strict-SemVer authority that hard-errors when
      matika's VERSION is unavailable), npm consumption of matika's frontend via
      the @manomatika/matika-frontend bare specifier, a ts/ TypeScript layout with
      kebab-case filenames, a notes-only tag-triggered release job, and a
      compiled-asset guardrail. Split the test suite into a stack-independent
      tier and a self-sufficient integration tier, and fixed a static-asset 404
      by mounting eyerate static at /eyerate/static to avoid a Starlette
      route-ordering conflict with matika's broad /static mount (regression test
      added).

  - repo: eyerate
    tag: v0.0.3
    date: "2026-04-28"
    status: published
    artifact: "none (notes-only GitHub release)"
    prs: "(historical; pre-migration to manomatika org — merged via legacy pjtallman/EyeRate#13 and pjtallman/EyeRate#14)"
    summary: >
      Consolidated-menu and applug-compatibility work: introduced the
      consolidated eyerate_menus.json menu matrix, flattened Admin role items into
      the aggregated Admin dropdown, removed the legacy eyerate_menu.json, and
      tightened .gitignore. KNOWN ISSUE: this tag shipped stale applug.json
      content — version and matika_version both declare 0.0.2 despite the v0.0.3
      tag, because the release process did not propagate VERSION into applug.json
      at tag time. Left in place as historical record; do not consume. v0.0.4
      establishes VERSION as the single source of truth with drift-detecting
      propagation into every version-bearing file. Tagged from the legacy
      pjtallman/EyeRate repository before the migration to the manomatika org.

  - repo: eyerate
    tag: v0.0.2
    date: "2026-04-27"
    status: published
    artifact: "none (notes-only GitHub release)"
    prs: "(historical; pre-migration to manomatika org — merged via legacy pjtallman/EyeRate#4)"
    summary: >
      Milestone 2 menu refactor. Reworked the menu structure with accompanying
      security fixes and persistence-layer improvements, refreshed applug metadata
      and documentation, and repaired the release script (symlink loop) and
      corrupted markdown headers. Tagged from the legacy pjtallman/EyeRate
      repository before the migration to the manomatika org.

  - repo: eyerate
    tag: v0.0.1
    date: "2026-04-18"
    status: published
    artifact: "none (notes-only GitHub release)"
    prs: "(historical; pre-migration to manomatika org — merged via legacy pjtallman/EyeRate#2)"
    summary: >
      Initial eyerate reference-implementation applug baseline. Phases 1–5 of the
      initial refactor: extracted eyerate's logic out of matika, renamed the
      financial-security artifacts for clarity, added the user guide and
      folder-structure documentation, and reached a deployable server with working
      password update. Tagged from the legacy pjtallman/EyeRate repository before
      the migration to the manomatika org.

