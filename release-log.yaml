      manomatika/matika v0.0.4-rc.10. Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.9
    date: "2026-06-26"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#103"
    summary: >
      Ninth release candidate for matika v0.0.4 (A5 #11) — corrects all 17
      stale/speculative markers in matika_screens.json. Root cause: the manifest
      was authored without consulting the templates, inventing a generic
      #…-form/.…-table/#…-container convention while the templates use deliberate
      page-prefixed schemes (hp-*, abt-*, us-*, and real ids roles-table,
      user-table, permission-editor). Six screens failed the tier-b gate entirely
      (all markers absent: home, about, admin_roles, admin_permissions,
      admin_users, user_settings); eleven passed via OR-semantics but each
      carried at least one stale id-marker. Fix: every marker replaced with a
      selector that actually renders in the screen's template, verified against
      live DOM via local arm tier-b run (all 17 core screens show 'marker
      present'). Regression (rule 22): test_screen_marker_resolution.py
      statically validates every declared marker resolves to a real selector in
      the rendering template(s) — FAILS on old manifest (25 stale markers
      caught), PASSES on this fix (25/25 green). Full matika suite 100% clean
      (544 passed, 0 failed/skipped/xfail/deselected/warnings). Paired with
      manomatika/eyerate v0.0.4-rc.4. Notes-only GitHub prerelease for QA.

  - repo: eyerate
    tag: v0.0.4-rc.4
    date: "2026-06-26"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/eyerate#70"
    summary: >
      Fourth release candidate for eyerate v0.0.4 (A5 #11) — a single route fix
      that unblocked tier-b L2 (PR manomatika/eyerate#70, one commit "fix:
      lookup_error screen returns to its declared route before marker
      assertion"). The securities_lookup_error screen's route previously ended
      on /eyerate/admin after triggering a 502 lookup, so tier-b asserted
      markers on the wrong page; the fix navigates back to /eyerate/securities
      before the marker assert (screen_id matches its declared route). The
      tier-b securities marker now passes via the ahimsa assert_value polling
      fix (manomatika/ahimsa#108), not any eyerate change. Includes a rule-22
      regression test. Full eyerate suite 100% clean. Paired with
      manomatika/matika v0.0.4-rc.9. Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.7
    date: "2026-06-20"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#81"
    summary: >
      Seventh release candidate for matika v0.0.4 — cumulative, cut from main
      after manomatika/matika#81, so it carries every prior rc.6 fix PLUS the
      launcher stale-plugin-refresh fix. Root cause of the user-reported "EyeRate
      admin shows coming soon / securities lookup dead after a reinstall": the
      frozen app bundles the CORRECT eyerate (rc.2, admin form + ProviderError),
      but launcher.py::_extract_bundled_plugins (a) only ran inside first_run_init
      — gated by the ~/matika/.initialized sentinel, so it never ran on an upgrade
      — and (b) skipped any plugin dir that already existed. On an install over a
      prior version the new bundled plugin code was never extracted, so the stale
      "coming soon" eyerate template left in ~/matika/plugins/eyerate/ from an
      earlier install survived every reinstall (the runtime data dir is not removed
      with the .app). Fix: plugin install/refresh now runs on EVERY launch and is
      version/content-fingerprint-gated — it refreshes plugin CODE when the bundled
      version or code differs from what is installed, while PRESERVING user/runtime
      DATA (manifest-gated overwrite + stale-code removal); per-plugin
      install/refresh/skip decisions are logged. Regression tests cover fresh /
      upgrade-refresh / same-version-skip / fingerprint-refresh / stale-removal /
      data-preservation (standing rule 22). Full matika suite 100% clean (439
      passed, 0 failed / 0 skipped / 0 xfail / 0 deselected / 0 warnings). Paired
      with manomatika/eyerate v0.0.4-rc.2 (unchanged) and the ahimsa frozen
      feature-verification harness (manomatika/ahimsa#77) that proves admin form +
      VOO lookup + stale-plugin refresh on BOTH fresh and upgrade-over-stale paths.
      Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.6
    date: "2026-06-20"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#80"
    summary: >
      Sixth release candidate for matika v0.0.4 — cumulative, cut from main after
      manomatika/matika#80, so it carries every prior rc.5 fix (Bug B applug-deps
      bundling via collect_all("yfinance"/"curl_cffi"), direct-file validate
      guard) PLUS the test-suite-100 runtime cleanups. Three root-cause changes:
      (1) JWT create_access_token now uses timezone-aware datetime.now(timezone.utc)
      instead of the deprecated naive datetime.utcnow() (Python 3.12+ deprecation
      removed at source); (2) authlib bumped 1.7.0 -> 1.7.2 in pyproject and
      requirements; (3) the test db fixture joins the session into the external
      transaction via a SAVEPOINT restarted after each commit/rollback, removing
      the SAWarning("transaction already deassociated") at root. The full matika
      suite is now 100% clean under -W error (435 passed, 0 failed / 0 skipped /
      0 xfail / 0 deselected / 0 warnings). No runtime behavior change beyond the
      timezone-aware tokens and the authlib patch bump. Paired with
      manomatika/eyerate v0.0.4-rc.2 (unchanged) and manomatika/ahimsa main
      (integration tier now runs in the full suite). Recipe re-pinned to
      v0.0.4-rc.6 + v0.0.4-rc.2. Frozen build smoke-validated green on arm,
      intel, and windows with data_deps_ok True. Notes-only GitHub prerelease
      for QA.

  - repo: eyerate
    tag: v0.0.4-rc.2
    date: "2026-06-20"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/eyerate#45"
    summary: >
      Second release candidate for eyerate v0.0.4. Bug A fix: replace the
      eyerate_admin.html stub ("Administration features coming soon.") with a
      working provider-selection form (radio buttons for yahoo/finnhub/
      alphavantage, API key field, Save/persist via POST). Task 4: add
      ProviderError exception class so all three data providers (Yahoo,
      Finnhub, AlphaVantage) raise on HTTP errors, rate limits, missing API
      keys, and dep-import failures instead of swallowing exceptions and
      returning empty results. Routes return HTTP 502 with "lookup failed:
      <reason>" so the UI distinguishes provider failure from genuine zero
      results. Lookup dialog JS checks resp.ok and shows an error message
      instead of silently showing empty rows. Dep-check at load time logs
      "Data provider deps OK (yfinance, curl_cffi)" for the ahimsa smoke
      gate. 13 new regression tests. Paired with manomatika/matika
      v0.0.4-rc.5 and manomatika/ahimsa#75 (applug deps install before
      freeze + data_deps_ok smoke gate). Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.5
    date: "2026-06-20"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#79"
    summary: >
      Fifth release candidate for matika v0.0.4. Adds collect_all("yfinance")
      and collect_all("curl_cffi") to matika.spec so the eyerate data-provider
      libraries are bundled in the frozen artifact. Previously these were lazy
      imports invisible to PyInstaller's static analysis, causing Bug B: symbol
      lookup/search silently returned empty results in the frozen app. Also
      adds a sys.path guard to validate_recipe.py so it can be run as a direct
      file without pip installation (fixes test_invocation_direct_file). Paired
      with manomatika/eyerate v0.0.4-rc.2 and manomatika/ahimsa#75 (applug
      deps install before freeze + data_deps_ok smoke gate). Smoke-validated
      green on all three platforms (arm, intel, windows) with data_deps_ok
      gate passing. Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.4
    date: "2026-06-19"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#78"
    summary: >
      Fourth release candidate for matika v0.0.4 — fixes the third boot failure:
      the frozen ManoMatika-0.0.1 bundle installed with the correct product
      identity (the rc.3 fix) but died on first launch with "No module named
      'alembic'" and left NO log file. Two matika defects: (1) matika.spec listed
      only alembic.command/alembic.config as hiddenimports, which does not collect
      the rest of the alembic package and its dynamically-loaded migration
      runtime — now uses PyInstaller collect_all("alembic") + collect_all(
      "sqlalchemy") and pins the in-process migration script_location to the
      bundled sys._MEIPASS migrations dir; (2) an early/import-time failure left
      no log — launcher.py now brings logging up first, installs a last-resort
      excepthook, and wraps the whole startup so a full traceback always reaches
      ~/matika/logs. The deeper root cause (the build never pip-installing
      matika's runtime deps before PyInstaller, so nothing was bundled) is fixed
      in manomatika/ahimsa#73, which also adds a CI smoke-launch step that boots
      the frozen artifact on all three platforms — the durable guardrail that
      makes an unbootable build fail in CI. Paired with manomatika/manomatika#17
      (recipe pinned to v0.0.4-rc.4). Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.3
    date: "2026-06-19"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#77"
    summary: >
      Third release candidate for matika v0.0.4 — fixes the product-identity
      regression introduced by v0.0.4-rc.2: the spec changes that read
      MATIKA_PRODUCT_NAME/MATIKA_PRODUCT_VERSION from the build env were merged
      to matika main after the rc.2 tag was cut, so CI builds cloning at rc.2
      produced Matika-0.0.4 instead of ManoMatika-0.0.1. Adds a CI fail-loud
      guard in matika.spec: if CI=true and MATIKA_PRODUCT_NAME is unset the spec
      exits immediately with a clear error instead of silently mis-naming the
      bundle. Paired with manomatika/manomatika#16 (recipe pinned to v0.0.4-rc.3)
      and manomatika/ahimsa#72 (PyInstaller assertion step + manomatika_ref
      cross-repo validation input). Notes-only GitHub prerelease for QA.

  - repo: matika
    tag: v0.0.4-rc.2
    date: "2026-06-18"
    status: published
    artifact: "none (notes-only GitHub prerelease)"
    prs: "manomatika/matika#70"
